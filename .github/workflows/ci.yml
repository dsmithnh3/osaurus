name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-core:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: Packages/OsaurusCore/.build
          key: spm-core-${{ runner.os }}-${{ hashFiles('Packages/OsaurusCore/Package.swift', 'Packages/OsaurusCore/Package.resolved') }}
          restore-keys: spm-core-${{ runner.os }}-

      - name: Test OsaurusCore
        run: >-
          swift test --package-path Packages/OsaurusCore
          --force-resolved-versions
          --skip KVCacheStoreTests
          --skip MLXGenerationEngineTests

  test-cli:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: Packages/OsaurusCLI/.build
          key: spm-cli-${{ runner.os }}-${{ hashFiles('Packages/OsaurusCLI/Package.swift', 'Packages/OsaurusCLI/Package.resolved') }}
          restore-keys: spm-cli-${{ runner.os }}-

      - name: Test OsaurusCLI
        run: swift test --package-path Packages/OsaurusCLI --force-resolved-versions

  swiftlint:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: find scripts -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning
