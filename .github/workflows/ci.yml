name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-core:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      WORKSPACE: osaurus.xcworkspace
      SPM_CACHE: .spm-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('osaurus.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      - name: Resolve dependencies
        run: >-
          xcodebuild -resolvePackageDependencies
          -workspace $WORKSPACE
          -scheme OsaurusCoreTests
          -clonedSourcePackagesDirPath $SPM_CACHE

      - name: Test OsaurusCore
        run: >-
          xcodebuild test
          -workspace $WORKSPACE
          -scheme OsaurusCoreTests
          -disableAutomaticPackageResolution
          -clonedSourcePackagesDirPath $SPM_CACHE
          -skip-testing OsaurusCoreTests/KVCacheStoreTests
          -skip-testing OsaurusCoreTests/MLXGenerationEngineTests

  test-cli:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      WORKSPACE: osaurus.xcworkspace
      SPM_CACHE: .spm-cache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ runner.os }}-${{ hashFiles('osaurus.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      - name: Resolve dependencies
        run: >-
          xcodebuild -resolvePackageDependencies
          -workspace $WORKSPACE
          -scheme OsaurusCLITests
          -clonedSourcePackagesDirPath $SPM_CACHE

      - name: Test OsaurusCLI
        run: >-
          xcodebuild test
          -workspace $WORKSPACE
          -scheme OsaurusCLITests
          -disableAutomaticPackageResolution
          -clonedSourcePackagesDirPath $SPM_CACHE

  swiftlint:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: find scripts -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning
